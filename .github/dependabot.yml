version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "your-github-username"
    labels:
      - "dependencies"
      - "type-devops"
    commit-message:
      prefix: "chore"
      prefix-scope: "deps"
      include: "scope"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignorer les mises à jour majeures pour les dépendances critiques
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "express"
        update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    reviewers:
      - "your-github-username"
    labels:
      - "dependencies"
      - "type-devops"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    reviewers:
      - "your-github-username"
    labels:
      - "dependencies"
      - "type-devops"
    commit-message:
      prefix: "ci"
      include: "scope"
